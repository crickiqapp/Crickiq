<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CricIQ - AI Cricket Analyzer</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0f1e; font-family: Inter, sans-serif; color: #fff; }
select option { background: #0a1020; color: #fff; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;
const PLAYERS = {
  "Virat Kohli": { role: "Batsman", team: "India", avg: 57.3 },
  "Rohit Sharma": { role: "Batsman", team: "India", avg: 48.9 },
  "Jasprit Bumrah": { role: "Bowler", team: "India", avg: 22.1 },
  "MS Dhoni": { role: "Wicket-Keeper", team: "India", avg: 50.6 },
  "Hardik Pandya": { role: "All-Rounder", team: "India", avg: 31.4 },
};
const FORMATS = ["Test","ODI","T20I","IPL"];
const CONDITIONS = ["Home","Away","Neutral"];
const OPPOSITIONS = ["Australia","England","Pakistan","South Africa","New Zealand"];

function App() {
  const [player, setPlayer] = useState("");
  const [format, setFormat] = useState("ODI");
  const [condition, setCondition] = useState("Home");
  const [opposition, setOpposition] = useState("Australia");
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState("");

  const analyze = async () => {
    if (!player.trim()) return;
    setLoading(true); setError(""); setResult(null);
    const pd = PLAYERS[player] || null;
    const prompt = `You are CricIQ cricket analyst. Analyze:
Player: ${player}
${pd ? "Role: "+pd.role+", Team: "+pd.team+", Avg: "+pd.avg : ""}
Format: ${format}, Condition: ${condition}, vs: ${opposition}
Respond ONLY in JSON no markdown:
{"performanceScore":85,"fantasyScore":90,"consistencyScore":80,"pressureScore":88,"role":"Batsman","team":"India","keyStrengths":["s1","s2","s3"],"watchOut":["w1","w2"],"fantasyTip":"tip","coachInsight":"insight","prediction":"pred","bestFormat":"ODI","rivalryFactor":"info"}`;
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 1000, messages: [{ role: "user", content: prompt }] })
      });
      const data = await res.json();
      const text = data.content?.map(i => i.text||"").join("").replace(/```json|```/g,"").trim();
      setResult({ ...JSON.parse(text), player });
    } catch(e) { setError("Analysis failed. Try again."); }
    setLoading(false);
  };

  const g = "#00e676"; const card = "#0e1628"; const bd = "#1a2640";
  return (
    <div style={{minHeight:"100vh",background:"#0a0f1e",padding:"20px 16px"}}>
      <div style={{textAlign:"center",marginBottom:24}}>
        <div style={{fontSize:26,fontWeight:900}}>🏏 Cric<span style={{color:g}}>IQ</span></div>
        <p style={{color:"#5a7a9a",fontSize:13,marginTop:4}}>AI Cricket Performance Analyzer</p>
      </div>
      <div style={{background:card,border:`1px solid ${bd}`,borderRadius:16,padding:20,marginBottom:16}}>
        <label style={{color:"#7a9ab8",fontSize:11,fontWeight:700}}>PLAYER NAME</label>
        <input value={player} onChange={e=>setPlayer(e.target.value)} placeholder="e.g. Virat Kohli..."
          style={{width:"100%",marginTop:8,padding:"12px 16px",background:"#0a1020",border:`1px solid ${bd}`,borderRadius:10,color:"#fff",fontSize:15,outline:"none"}}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginTop:14}}>
          <div>
            <label style={{color:"#7a9ab8",fontSize:11,fontWeight:700}}>FORMAT</label>
            <select value={format} onChange={e=>setFormat(e.target.value)}
              style={{width:"100%",marginTop:6,padding:"10px",background:"#0a1020",border:`1px solid ${bd}`,borderRadius:10,color:"#fff",fontSize:14,outline:"none"}}>
              {FORMATS.map(f=><option key={f}>{f}</option>)}
            </select>
          </div>
          <div>
            <label style={{color:"#7a9ab8",fontSize:11,fontWeight:700}}>CONDITION</label>
            <select value={condition} onChange={e=>setCondition(e.target.value)}
              style={{width:"100%",marginTop:6,padding:"10px",background:"#0a1020",border:`1px solid ${bd}`,borderRadius:10,color:"#fff",fontSize:14,outline:"none"}}>
              {CONDITIONS.map(c=><option key={c}>{c}</option>)}
            </select>
          </div>
        </div>
        <div style={{marginTop:14}}>
          <label style={{color:"#7a9ab8",fontSize:11,fontWeight:700}}>OPPOSITION</label>
          <select value={opposition} onChange={e=>setOpposition(e.target.value)}
            style={{width:"100%",marginTop:6,padding:"10px",background:"#0a1020",border:`1px solid ${bd}`,borderRadius:10,color:"#fff",fontSize:14,outline:"none"}}>
            {OPPOSITIONS.map(o=><option key={o}>{o}</option>)}
          </select>
        </div>
        <button onClick={analyze} disabled={loading||!player.trim()}
          style={{width:"100%",marginTop:18,padding:14,background:loading?"#1a2640":`linear-gradient(135deg,${g},#00bcd4)`,border:"none",borderRadius:12,color:"#000",fontSize:15,fontWeight:800,cursor:"pointer"}}>
          {loading?"⚙️ Analyzing...":"🔍 Analyze Player"}
        </button>
      </div>
      {error&&<div style={{background:"#2a0a0a",border:"1px solid #f44336",borderRadius:12,padding:14,color:"#f44336",marginBottom:16}}>{error}</div>}
      {result&&(
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <div style={{background:card,border:`1px solid ${g}33`,borderRadius:16,padding:20}}>
            <h2 style={{margin:0,fontSize:20,fontWeight:900}}>{result.player}</h2>
            <p style={{margin:"4px 0 0",color:"#5a9ab8",fontSize:13}}>{result.role} • {result.team}</p>
            <p style={{margin:"2px 0 0",color:"#3a6a88",fontSize:12}}>{format} • {condition} • vs {opposition}</p>
            <div style={{marginTop:12,display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:56,height:56,borderRadius:"50%",border:`3px solid ${g}`,display:"flex",alignItems:"center",justifyContent:"center"}}>
                <span style={{color:g,fontSize:18,fontWeight:800}}>{result.performanceScore}</span>
              </div>
              <span style={{color:g,fontWeight:700}}>PERFORMANCE SCORE</span>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            {[["⭐","Fantasy",result.fantasyScore,"#ffeb3b"],["📊","Consistency",result.consistencyScore,"#2196f3"],
              ["🧠","Pressure IQ",result.pressureScore,"#e91e63"],["🏏","Overall",result.performanceScore,g]].map(([icon,label,val,color])=>(
              <div key={label} style={{background:card,border:`1px solid ${bd}`,borderRadius:12,padding:14}}>
                <div style={{fontSize:20}}>{icon}</div>
                <div style={{fontSize:22,fontWeight:900,color,marginTop:4}}>{val}</div>
                <div style={{fontSize:11,color:"#5a7a9a",fontWeight:600}}>{label.toUpperCase()}</div>
              </div>
            ))}
          </div>
          <div style={{background:card,border:`1px solid ${bd}`,borderRadius:14,padding:18}}>
            <h3 style={{margin:"0 0 10px",color:"#7a9ab8",fontSize:13,fontWeight:700}}>💪 KEY STRENGTHS</h3>
            {result.keyStrengths?.map((s,i)=><div key={i} style={{color:"#cde",fontSize:14,marginBottom:6}}>✓ {s}</div>)}
          </div>
          <div style={{background:card,border:"1px solid #f4433633",borderRadius:14,padding:18}}>
            <h3 style={{margin:"0 0 10px",color:"#f44336",fontSize:13,fontWeight:700}}>⚠️ WATCH OUT</h3>
            {result.watchOut?.map((w,i)=><div key={i} style={{color:"#cde",fontSize:14,marginBottom:6}}>! {w}</div>)}
          </div>
          <div style={{background:card,border:`1px solid ${g}33`,borderRadius:14,padding:18}}>
            <h3 style={{margin:"0 0 8px",color:g,fontSize:13,fontWeight:700}}>⭐ FANTASY TIP</h3>
            <p style={{margin:0,color:"#cde",fontSize:14,lineHeight:1.6}}>{result.fantasyTip}</p>
          </div>
          <div style={{background:card,border:"1px solid #2196f333",borderRadius:14,padding:18}}>
            <h3 style={{margin:"0 0 8px",color:"#2196f3",fontSize:13,fontWeight:700}}>🎯 COACH INSIGHT</h3>
            <p style={{margin:0,color:"#cde",fontSize:14,lineHeight:1.6}}>{result.coachInsight}</p>
          </div>
          <div style={{background:card,border:`1px solid ${bd}`,borderRadius:14,padding:16}}>
            <h3 style={{margin:"0 0 6px",color:"#ff9800",fontSize:12,fontWeight:700}}>🔮 PREDICTION</h3>
            <p style={{margin:0,color:"#cde",fontSize:13}}>{result.prediction}</p>
          </div>
          <div style={{textAlign:"center",padding:"8px 0 16px",color:"#2a4a6a",fontSize:11}}>
            Powered by CricIQ AI
          </div>
        </div>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
